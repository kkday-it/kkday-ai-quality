# 生產編排示範：postgres + backend（FastAPI）+ frontend（nginx 靜態 + /api 反代）。完整命令見 docker/README.md。
# 機密經 .env / secret manager 注入（compose 會讀同目錄 .env），勿寫死於此檔。
#
#   啟動：   ./start.sh prod    （零配置：首次自動生成機密寫入 .env，冪等永不覆蓋既有值）
#   或手動： POSTGRES_PASSWORD=... AIQ_SECRET_KEY=... OPENAI_API_KEY=... docker compose up -d --build
#   停止：   docker compose down                    （資料保留於 pgdata volume）
#   看 log： docker compose logs -f backend
#
# restart: unless-stopped → 容器崩潰 / 主機重開機自動拉起（配合 host 的 docker daemon 開機自啟）。
name: kkday-ai-quality # 固定專案名（與 dev 同名共用前綴；dev/prod 服務同名會互斥，同機同時跑請改其一）
services:
  db:
    image: postgres:17-alpine
    container_name: kkday-ai-quality-db-prod # 去 -1 尾碼；-prod 後綴與 dev 容器名區隔
    restart: unless-stopped
    environment:
      POSTGRES_DB: kkdb_ai_quality
      # 生產必填密碼（缺即 compose 拒啟動）；backend DATABASE_URL 同步引用同一變數
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?須設定 POSTGRES_PASSWORD（生產不可 trust 免密；隨機字串經 secret 注入）}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # 注意：生產不掛 ./docker/seed 進 initdb.d（dev 專屬；官方鏡像空卷首啟會無條件灌入
      # 開發 seed，誤入正式庫）。schema 由 backend entrypoint 建立（空庫 init_db / 既有庫 alembic
      # upgrade）；資料以 datapack 匯入或 scripts/ops/restore-db.sh 還原。
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    # 顯式 :prod tag：與 dev 分 tag，兩形態 build 互不覆蓋（同專案名+服務名時 compose 預設共用 tag）
    image: kkday-ai-quality-backend:prod
    container_name: kkday-ai-quality-backend-prod
    restart: unless-stopped
    # 須 > uvicorn --timeout-graceful-shutdown 30（Dockerfile CMD），否則 docker SIGKILL 搶先於 drain 完成
    stop_grace_period: 35s
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:?須設定 POSTGRES_PASSWORD}@db:5432/kkdb_ai_quality
      # settings 表機密 at-rest 加密 key；未設則 llm token / QC 密碼明文落庫（crypto.py 正式環境拒啟動）
      AIQ_SECRET_KEY: ${AIQ_SECRET_KEY:?須設定 AIQ_SECRET_KEY（python -c "import secrets;print(secrets.token_urlsafe(32))"）}
      # LLM key（fallback；使用者可於設定面板配 per-provider token）。可空啟動，但 production
      # 有 stub 硬閘：解不出任何 token 的批量判決一律 403（防 stub 假判覆蓋真歸因）
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # 前端對外網域（逗號分隔多個）；預設對齊本 compose 的 frontend 埠
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:8080}
    volumes:
      # runtime 派生產物（llm_cache / reports）持久化：不掛則每次部署快取歸零，
      # 佐證/LLM 快取重建需重打 production snapshot（單筆 2.5~8.8s）——修既有缺口（訂單佐證閉環）
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8100"
    healthcheck:
      # 用內建 python 打 /api/status（公司健康檢查契約；image 無 curl）；start_period 留給 alembic upgrade + uvicorn 啟動
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8100/api/status').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: kkday-ai-quality-frontend:prod # 同 backend：與 dev 分 tag 防互蓋
    container_name: kkday-ai-quality-frontend-prod
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
