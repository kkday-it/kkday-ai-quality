# 前端 nginx：SPA history fallback + /api 反代後端 + 靜態資源長快取。
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 帶 hash 的建置產物：長快取、immutable
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API 反代到後端服務。
    # 用 resolver + 變數 → nginx 改為「運行時」解析 upstream；
    # 否則 nginx 啟動時就硬解析 backend DNS，backend 未就緒時整個 nginx crash（拒啟動）。
    # 127.0.0.11 為 Docker compose / bridge 內建 DNS；k8s 環境改用叢集 DNS（如 kube-dns 的 ClusterIP）。
    location /api/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $backend_upstream backend:8100;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA：其餘路徑一律回 index.html，交給 vue-router history 模式
    location / {
        try_files $uri $uri/ /index.html;
    }
}
