# AI 法官前端 Deployment（草稿·nginx 靜態 SPA）
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiq-frontend
  labels:
    app: aiq-frontend
spec:
  # 前端無狀態（純靜態產物）→ 多 replica + RollingUpdate 消除 SPA shell 層更新空窗；
  # /api 命中 backend Recreate 空窗時仍可能 502（兩者分開向 SRE 說明，見 deploy/README.md）
  replicas: 2
  selector:
    matchLabels:
      app: aiq-frontend
  template:
    metadata:
      labels:
        app: aiq-frontend
    spec:
      containers:
        - name: nginx
          image: REPLACE_ME_ECR/aiq-frontend:latest # ECR repo 名稱待 DevOps 提供
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 80
            periodSeconds: 15
