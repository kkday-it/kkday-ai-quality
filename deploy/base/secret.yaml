# AI 法官後端 Secret 範例（僅列 key 名；實際值由 config-manager 維護，絕不放真值、勿直接 apply）
# <svc>-secret＝團隊自控機密；<svc>-cloud-secret＝DevOps 控管機密（如 DB 連線）——分兩物件依公司慣例
apiVersion: v1
kind: Secret
metadata:
  name: aiq-backend-secret
type: Opaque
stringData:
  AIQ_JWT_SECRET: REPLACE_ME # JWT 簽章（≥32 bytes）
  AIQ_SECRET_KEY: REPLACE_ME # user_settings 機密 at-rest 加密
  OPENAI_API_KEY: REPLACE_ME # LLM 判決 key（缺值時 production 有 stub 硬閘擋批量）
---
apiVersion: v1
kind: Secret
metadata:
  name: aiq-backend-cloud-secret
type: Opaque
stringData:
  # RDS endpoint 待 DevOps 開通後回填；建議顯式帶 ?sslmode=require（RDS 相容清單見 deploy/README.md）
  DATABASE_URL: postgresql+psycopg2://REPLACE_ME
