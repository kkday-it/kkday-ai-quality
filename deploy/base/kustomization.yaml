# AI 法官 Kustomize base（草稿·供 cloud team review；正式版落 kkday-it/kkday-k8s-apps，
# 目錄結構/labels/ArgoCD app-of-apps 慣例以該 repo 既有專案為準對齊）
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - backend-deployment.yaml
  - backend-service.yaml
  - frontend-deployment.yaml
  - frontend-service.yaml
  - ingress.yaml
  - configmap.yaml
  - secret.yaml
labels:
  - pairs:
      app.kubernetes.io/part-of: kkday-ai-quality
